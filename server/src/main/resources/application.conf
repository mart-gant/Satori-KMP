ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.gantlab.satori.ApplicationKt.module ]
    }
}

storage {
    driverClassName = "org.h2.Driver"
    driverClassName = ${?DB_DRIVER}
    jdbcURL = "jdbc:h2:file:./satori_db;DB_CLOSE_DELAY=-1;"
    jdbcURL = ${?JDBC_URL}
    dbUser = ""
    dbUser = ${?DB_USER}
    dbPassword = ""
    dbPassword = ${?DB_PASSWORD}
}

jwt {
    secret = "satori-super-secret-key-12345"
    secret = ${?JWT_SECRET}
    issuer = "http://0.0.0.0:8080/"
    issuer = ${?JWT_ISSUER}
    audience = "satori-users"
    audience = ${?JWT_AUDIENCE}
}

gemini {
    apiKey = ""
    apiKey = ${?GEMINI_API_KEY}
}
